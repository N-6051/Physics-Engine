<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: rgb(1,10,11);
      height: 100vh;
      width: 100vw;
      display: grid;
      place-items: center;
    }
    canvas {
      position: relative;
      border: 1px solid rgba(225,251,254,0.1);
      box-shadow: 0 5px 40px rgba(255,251,254,0.1);
    }
    #info {
      position: absolute;
      color: rgba(180,231,253,0.8);
      font-size: 10px;
      top: 10px;
      left: 5px;
      font-family: monospace;
    }
    #logo {
      position: absolute;
      top: 250px;
      left: 30px;
      font-size: 12px;
      font-weight: ;
      animation: out 1s ease-out;
      animation-delay: 1s;
      animation-fill-mode: forwards;
    }
    @keyframes out {
      0% {
        
      }
      100% {
        transform: translateX(-200px) scale(0.1) translateY(50px);
        opacity: 0.5;
      }
    }
    
    #logo span:nth-child(1) {
      color: rgb(38,255,253);
      text-shadow: 0 0 20px rgb(38,255,253);
    }
    #logo span:nth-child(2) {
      color: #fff;
      text-shadow: 0 0 20px #fff;
    }
  </style>
</head>
<body>
  <div id="info"></div>
  <canvas id="game">Not Supported!</canvas>
  <p id="logo"><span>Double</span><span>Pendulum</span></p>

  <script src="src/Asset.js"></script>
<script type="module">
  // engine, Assets import and setup
  import * as ED from "./src/Engine.js"
  //import { Assets } from "./src/Assets.js"
  
  const engine = ED.default;
  const {
    Body, Sprite, Circle, Polygon,
    Vector,
    Assets,
    Collisions, Solver, Manifold, Grid, DistanceConstraint
  } = engine;


  // canvas steup and resize
  const canvas = document.querySelector("#game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const dpr = window.devicePixelRatio || 1;
  let ZOOM = 1;
  ctx.scale(ZOOM * dpr, ZOOM * dpr);
  resize();

  // resize function and event listener
  function resize() {
    let w = window.innerWidth, h = window.innerHeight;
    w > h ? w = 16 / 9 * h : h = 9 / 16 * w;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
  }
  window.addEventListener("resize", e => {
    resize();
  })


  
  // load assets 
  const res = new Assets();
  const dat = [
    { key: "mio1", url: "https://a.storyblok.com/f/178900/960x540/9c3a8da7e7/date-a-live-v.jpg/m/filters:quality(95)format(webp)", type: "img" },
   // { key: "mio2", url: "", type: "audio" },
    { key: "mio3", url: "https://raw.githubusercontent.com/AvinashPro/AvinashPro.github.io/refs/heads/main/files/Grotto%20Escape/assets/json/tilemap1.json", type: "json" }
  ];
  //await res.load(dat);
  //let mio = res.get("mio1");


  const GRAVITY = new Vector(0, 200);
  const subSteps = 4;
  const solver = new Solver(10);

  const entities = [];
  const constraints = [];
  /*
  entities.push(
    generateRect({
      x: 130, y: 180, w: 100, h: 5, mass: 0, color: "0,132,190"
    }),
    generateRect({
      x: 29, y: 112, angle: 1.2, w: 150, h: 5, mass: 0, color: "0,132,190"
    }),
    generateRect({
      x: 180, y: 112, angle: -1.2, w: 150, h: 5, mass: 0, color: "0,132,190"
    })
    ,
    generateRect({
      x: 150, y: 20, angle: -0.2, w: 60, h: 4, color: "150,140,0"
    })
  );*/

  const cir1 = new Circle({
    x: 170, y: 50, r: 0, mass: 0
  });
  const cir2 = new Circle({
    x: 200, y: 60, r: 3, mass: 1
  })
  const cir3 = new Circle({
    x: 270, y: 30, r: 3, mass: 1
  })
  const cir4 = new Circle({
    x: 200, y: 60, r: 3, mass: 1
  })
  const cir5 = new Circle({
    x: 270, y: 31, r: 3, mass: 1
  })
  const distConst1 = new DistanceConstraint(cir1, cir2, new Vector(0, 0), new Vector(0, 0), 70);
  const distConst2 = new DistanceConstraint(cir3, cir2, new Vector(0, 0), new Vector(0, 0), 70);
  const distConst3 = new DistanceConstraint(cir1, cir4, new Vector(0, 0), new Vector(0, 0), 70);
  const distConst4 = new DistanceConstraint(cir4, cir5, new Vector(0, 0), new Vector(0, 0), 70);

  
  entities.push(cir1, cir2, cir3, cir4, cir5);
  constraints.push(distConst1);
  constraints.push(distConst2, distConst3, distConst4);
  console.log(entities, constraints);


  class Trail {
      constructor(size = 100) {
        this.size = size;
        this.points = [];

        this.start = 0;
        this.count = 0;
      }
      
      add(point) {
        const i = (this.start + this.count) % this.size;
        this.points[i] = point;

        if (this.count < this.size) {
            this.count++;
        } else {
            this.start = (this.start + 1) % this.size;
        }
      }
      get(i) {
        return this.points[(this.start + i) % this.size];
      }
      
    }
  const tracedPath = new Trail(100);
  for(let i = 0; i < tracedPath.size; i++) {
    tracedPath.add(cir3.pos.clone())
  }
  
  const trail2 = new Trail(100);
  for(let i = 0; i < trail2.size; i++) {
    trail2.add(cir5.pos.clone());
  }
  
  
  
  

  function generateRect(params) {
    const w2 = params.w / 2,
        h2 = params.h / 2;
    const x = params.x + w2,
        y = params.y + h2;
    
    const poly = new Polygon({x, y,mass: params.mass, vertices: [
      new Vector(w2, h2),
      new Vector(-w2, h2),
      new Vector(-w2, -h2),
      new Vector(w2, -h2)
    ]});
    poly.angle = params.angle || 0;
    if(params.color) poly.color = params.color;
    //poly.computeWorldCoords();
    return poly;
  }
  function generatePolyVertices(n, r = 15) {
    const result = [];
    const u = Math.PI * 2 / n;
    for(let i = 0; i < n; i++) {
      const a = i * u;
      result.push(new Vector(
        Math.cos(a) * r,
        Math.sin(a) * r
      ));
    }
    return result;
  }


  // dt and fps related variables 
  let fps = 90, dt, then = performance.now(), now = performance.now(), lastTime = performance.now(), frames = 0;
  let infoElm = document.querySelector("#info");

  function calcDtFps() {
    now = performance.now();
    dt = (now - then) * 0.001;
    then = now;
    if(now - lastTime < 1000) {
      frames++;
    } else {
      fps = frames;
      frames = 1;
      lastTime = now;
    }
  }

  // game loop 
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // fps and dt 
    calcDtFps();
    infoElm.textContent = `FPS: ${fps}`;
    tracedPath.add(cir3.pos.clone());
    trail2.add(cir5.pos.clone());
    


    const subDt = dt / subSteps;
    for(let i = 0; i < subSteps; i++) {
solver.excludeCollision(cir1, cir3)
solver.excludeCollision(cir1, cir4)
solver.excludeCollision(cir1, cir5)
solver.excludeCollision(cir3, cir4)
solver.excludeCollision(cir4, cir2)
solver.excludeCollision(cir5, cir2)
solver.excludeCollision(cir3, cir5)
      


      for(let e of entities) {
        e.applyForce(GRAVITY.clone().scale(e.mass));
        e.updateVel(subDt);
        e.computeWorldVerts();
      }

      for(const c of constraints) {
        solver.excludeCollision(c.bodyA, c.bodyB);
        c.preCompute();
      }
      
      solver.detectCollisions(entities);
      //for(const c of)
      solver.solve(constraints);
      for(const e of entities) e.updatePos(subDt);
      solver.correctPositions(constraints);
      for(const e of entities) e.clearForces();

      solver.noCollide = [];
      
    }


    const z = ZOOM * dpr;
    for(const e of entities) {
      // transformation matrix 
      const sin = Math.sin(e.angle),
            cos = Math.cos(e.angle);
      /*const matrix = new DOMMatrix([
        cos * z,
        sin * z,
        - sin * z,
        cos * z,
        e.pos.x * z,
        e.pos.y * z
      ]);*/
      ctx.setTransform(cos * z, sin * z, -sin * z, cos * z, e.pos.x * z, e.pos.y * z);
      e.render(ctx);
      
    }

    for(const c of constraints) {
      const sin = Math.sin(c.bodyA.angle),
            cos = Math.cos(c.bodyA.angle);
      /*const matrix = new DOMMatrix([
        cos * z,
        sin * z,
        - sin * z,
        cos * z,
        e.pos.x * z,
        e.pos.y * z
      ]);*/
      ctx.setTransform(z, 0, 0, z, 0, 0)
     // ctx.setTransform(cos * z, sin * z, -sin * z, cos * z, c.bodyA.x * z, c.bodyA.y * z);
      c.render(ctx)
      
      
    }

    
    //ctx.beginPath();
    //ctx.strokeStyle = "rgb(222,255,38)";
    ctx.strokeStyle = "#f04";
    
    //ctx.moveTo(tracedPath[0].x, tracedPath[0].y);
    


    
    for(let j = 1; j < tracedPath.size; j++) {
      ctx.beginPath();
      ctx.globalAlpha = j / tracedPath.count;
      let p0 = tracedPath.get(j - 1);
      let p1 = tracedPath.get(j);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    ctx.strokeStyle = "rgb(38,255,255)";
    for(let j = 1; j < trail2.size; j++) {
      ctx.beginPath();
      ctx.globalAlpha = j / trail2.count;
      let p0 = trail2.get(j - 1);
      let p1 = trail2.get(j);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    

    ctx.globalAlpha = 1;

    //ctx.resetTransform();
    ctx.setTransform(z, 0, 0, z, 0, 0);
    requestAnimationFrame(loop);
  }
  loop();


const randint = (min, max) => Math.round(Math.random() * (max - min)) + min;
  
const canvasRect = canvas.getBoundingClientRect();
canvas.addEventListener("pointerdown", e => {
  const r = randint(5, 10);
  const mass = r * 1.2*100;
  const x = e.clientX - canvasRect.left,
        y = e.clientY - canvasRect.top;

  let ent;
  if(Math.random() > 0.5) {
    ent = new Circle({ x, y, r, mass });
  } else {
    ent = new Polygon({
      x, y, mass, vertices: generatePolyVertices(randint(3,8), r)
    })
   // console.log(generatePolyVertices(4))
  }

  entities.push(ent);
  
})
  
</script>
</body>
</html>
