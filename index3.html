</head>
<body>
  <canvas id="game">Not Supported!</canvas>
  <div id="info"></div>

  <script src="src/Asset.js"></script>
<script type="module">
  // engine, Assets import and setup
  import * as ED from "./src/Engine.js"
  //import { Assets } from "./src/Assets.js"
  
  const engine = ED.default;
  const {
    Body, Sprite, Circle, Polygon,
    Vector,
    Assets, Joystick,
    Collisions, Solver, Manifold, Grid, DistanceConstraint, SpringConstraint, RopeConstraint
  } = engine;

 // const grid = new Grid(16);


  // canvas steup and resize
  const canvas = document.querySelector("#game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const dpr = window.devicePixelRatio || 1;
  let ZOOM = 1;
  ctx.scale(ZOOM * dpr, ZOOM * dpr);
  resize();

  // resize function and event listener
  function resize() {
    let w = window.innerWidth, h = window.innerHeight;
    //w > h ? w = 16 / 9 * h : h = 9 / 16 * w;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
  }
  window.addEventListener("resize", e => {
    resize();
  })


  
  // load assets 
  const res = new Assets();
  const dat = [
    { key: "mio1", url: "https://a.storyblok.com/f/178900/960x540/9c3a8da7e7/date-a-live-v.jpg/m/filters:quality(95)format(webp)", type: "img" }
   // { key: "mio2", url: "", type: "audio" },
    // { key: "mio3", url: "", type: "json" }
  ];
  //await res.load(dat);
  //let mio = res.get("mio1");


  const GRAVITY = new Vector(0, 200);
  const subSteps = 4;
  const grid = new Grid(16);
  const solver = new Solver(10, grid);

  const entities = [];
  const constraints = [];

  const joystick = new Joystick(70, 180, 15, 30, 100);
  joystick.init(canvas);
 // console.log(joystick)
  /*
  entities.push(
    generateRect({
      x: 130, y: 180, w: 100, h: 5, mass: 0, color: "0,132,190"
    }),
    generateRect({
      x: 29, y: 112, angle: 1.2, w: 150, h: 5, mass: 0, color: "0,132,190"
    }),
    generateRect({
      x: 180, y: 112, angle: -1.2, w: 150, h: 5, mass: 0, color: "0,132,190"
    })/*,
    generateRect({
      x: 150, y: 20, angle: -0.2, w: 60, h: 4, color: "150,140,0"
    })
  );*/

  const cir1 = new Circle({
    x: 300, y: 50, r: 10, mass: 5
  });
  const cir2 = new Circle({
    x: 250, y: 40, r: 10, mass: 5
  })
  const distConst1 = new DistanceConstraint(cir1, cir2, new Vector(5, 0), new Vector(-5, 0), 70);
  entities.push(cir1, cir2);
  
  
  

  const floor = new Polygon({
    x: canvas.clientWidth/2, y: canvas.clientHeight, mass: 0, vertices:
      [
        new Vector(canvas.clientWidth/2, 5),
        new Vector(-canvas.clientWidth/2, 5),
        new Vector(-canvas.clientWidth/2, -20),
        new Vector(canvas.clientWidth/2, -20)
      ]
  })
  floor.color = "22,45,75"
  const roof = new Polygon({
    x: 180, y: 40, mass: 0, vertices:
      [
        new Vector(100, 5),
        new Vector(-100, 5),
        new Vector(-100, -5),
        new Vector(100, -5)
      ]
  })
  roof.color = "100,100,300"

  const platform = new Polygon({
    x: 125, y: 100, mass: 5, vertices: [
      new Vector(50, 1),
      new Vector(-50, 1),
      new Vector(-50, -1),
      new Vector(50, -1)
    ]
  });
  const cir4 = new Circle({
    x: 120, y: 40, r: 10, mass: 5
  })
  const springConst1 = new SpringConstraint(roof, platform, new Vector(-90, 5), new Vector(-40, 0), {
    maxLength: 50, stiffness: 300, restLength: 30, minLength: 10
  });
  const springConst2 = new SpringConstraint(roof, platform, new Vector(-20, 5), new Vector(40, 0), {
    maxLength: 50, stiffness: 300, restLength: 30, minLength: 10
  });
  entities.push(platform);

  const i1 = new Circle({
    x: 200, y: 100, r: 5, mass: 10
  });
  const i2 = new Circle({
    x: 250, y: 100, r: 5, mass: 10
  });
  const sc3 = new SpringConstraint(i1, i2, new Vector(), new Vector(), {
    restLength: 50, minLength: 30, maxLength: 70, stiffness: 600
  });
 const sc4 = new SpringConstraint(i1, roof, new Vector(), new Vector(20, 0), {
   restLength: 60, minLength: 40, maxLength: 80, stiffness: 600
 })
  const sc5 = new SpringConstraint(i2, roof, new Vector(), new Vector(70, 0), {
    restLength: 60, minLength: 40, maxLength: 80, stiffness: 600
  })
  entities.push(i1, i2);
  
  constraints.push(sc3, sc4, sc5)


  

  entities.push(floor, roof)
  constraints.push(distConst1, springConst1, springConst2);
  console.log(entities, constraints, SpringConstraint);

  const poly1 = new Polygon({
    x: 120, y: 50, mass: 1, vertices: [
      new Vector(5, 5),
      new Vector(-5, 5),
      new Vector(-5, -5),
      new Vector(5, -5)
    ]
  });
  const ropeConst1 = new RopeConstraint(poly1, roof, new Vector(), new Vector(0, 5), 200)
  entities.push(poly1)
  constraints.push(ropeConst1)
  console.log(ropeConst1)
  
  
  
  
  function generateStack(s, n, sx, sy) {
    let y = sy + s;
    for(let i = n; i > 0; i--) {
      let x = sx + s;
      sx += s;
      y -= 2 * s;
      for(let j = 0; j < i; j++) {
        x += 2 * s;
        entities.push(new Polygon({
          x, y, mass: 1, vertices: [
            new Vector(s, s),
            new Vector(-s, s),
            new Vector(-s, -s),
            new Vector(s, -s)
          ]
        }));
      }
      
    }
  }

  generateStack(8, 12, 10, canvas.clientHeight - 20);

  function generateRect(params) {
    const w2 = params.w / 2,
        h2 = params.h / 2;
    const x = params.x + w2,
        y = params.y + h2;
    
    const poly = new Polygon({x, y,mass: params.mass, vertices: [
      new Vector(w2, h2),
      new Vector(-w2, h2),
      new Vector(-w2, -h2),
      new Vector(w2, -h2)
    ]});
    poly.angle = params.angle || 0;
    if(params.color) poly.color = params.color;
    //poly.computeWorldCoords();
    return poly;
  }
  function generatePolyVertices(n, r = 15) {
    const result = [];
    const u = Math.PI * 2 / n;
    for(let i = 0; i < n; i++) {
      const a = i * u;
      result.push(new Vector(
        Math.cos(a) * r,
        Math.sin(a) * r
      ));
    }
    return result;
  }


  // dt and fps related variables 
  let fps = 90, dt, then = performance.now(), now = performance.now(), lastTime = performance.now(), frames = 0;
  let infoElm = document.querySelector("#info");

  function calcDtFps() {
    now = performance.now();
    dt = (now - then) * 0.001;
    then = now;
    if(now - lastTime < 1000) {
      frames++;
    } else {
      fps = frames;
      frames = 0;
      lastTime = now;
    }
  }
  
  // game loop 
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // fps and dt 
    calcDtFps();
    infoElm.textContent = `FPS: ${fps}`;


    const subDt = dt / subSteps;
    for(let i = 0; i < subSteps; i++) {

      for(const c of constraints) {
        if(c instanceof SpringConstraint) c.applySpringForce();
      }
      
      for(let e of entities) {
        e.applyForce(GRAVITY.clone().scale(e.mass));
        e.updateVel(subDt);
        e.computeWorldVerts();
        e.computeBoundingBox();
      }

      for(const c of constraints) {
        solver.excludeCollision(c.bodyA, c.bodyB);
        c.preCompute();
      }

      
      solver.detectCollisions(entities);
      //for(const c of)
      solver.solve(constraints);
      for(const e of entities) e.updatePos(subDt);
      solver.correctPositions(constraints);
      for(const e of entities) e.clearForces();

      solver.noCollide = [];
      
    }


    const z = ZOOM * dpr;
    ctx.setTransform(z, 0, 0, z, 0, 0);
    for(const e of entities) {
      ctx.fillStyle = "rgba(255,255,255,0.05)";
      ctx.fillRect(
        e.boundingBox.minX,
        e.boundingBox.minY,
        e.boundingBox.maxX - e.boundingBox.minX,
        e.boundingBox.maxY - e.boundingBox.minY
      );
    }
    
    for(const e of entities) {
      // transformation matrix 
      const sin = Math.sin(e.angle),
            cos = Math.cos(e.angle);
      /*const matrix = new DOMMatrix([
        cos * z,
        sin * z,
        - sin * z,
        cos * z,
        e.pos.x * z,
        e.pos.y * z
      ]);*/
      ctx.setTransform(cos * z, sin * z, -sin * z, cos * z, e.pos.x * z, e.pos.y * z);
      e.render(ctx);

      
      
      
    }

    ctx.setTransform(z, 0, 0, z, 0, 0);
    for(const c of constraints) c.render(ctx);
    joystick.update();
    joystick.render(ctx);
    //infoElm.textContent += " (" + joystick.x.toFixed(2) + ", " + joystick.y.toFixed(2) + ")";
    //entities[5].vel.add(joystick.n.scale(10))
    
    infoElm.textContent += " " + solver.collisionCount + " collisions! " + entities.length + " entities!";
    //ctx.resetTransform();
    requestAnimationFrame(loop);
  }
  loop();


const randint = (min, max) => Math.round(Math.random() * (max - min)) + min;
  
const canvasRect = canvas.getBoundingClientRect();
canvas.addEventListener("pointerdown", e => {
  if(joystick.active) return;
  const r = randint(5, 10);
  const mass = r * 1.2;
  const x = e.clientX - canvasRect.left,
        y = e.clientY - canvasRect.top;

  let ent;
  if(Math.random() > 0.8) {
    ent = new Circle({ x, y, r, mass });
  } else {
    ent = new Polygon({
      x, y, mass, vertices: generatePolyVertices(randint(3,8), r)
    })
   // console.log(generatePolyVertices(4))
  }

  entities.push(ent);
  
})
canvas.addEventListener("pointerup", () => {
  //if(joystick.active)
 // console.log(joystick.x, joystick.y)
  //if(!joystick.active) return;
  let e = new Polygon({
    x: joystick.pos.x, y: joystick.pos.y, mass: 10, vertices: generatePolyVertices(randint(3, 8), 5)
  });
  //entities.push(e)
  //console.log(e)
  
  
  entities.push(e);
  let v = 300;
  e.vel.set(-joystick.x * v, -joystick.y * v);
})
  
</script>
